<script>
document.addEventListener('keydown', function(e) {
  // 禁用 F12
  if (e.key === 'F12' || e.keyCode === 123) {
    e.preventDefault();
    return false;
  }
  
  // 禁用 Ctrl+Shift+I
  if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
    e.preventDefault();
    return false;
  }
  
  // 禁用 Ctrl+U
  if (e.ctrlKey && e.keyCode === 85) {
    e.preventDefault();
    return false;
  }
  
  // 禁用右键菜单
  if (e.button === 2) {
    e.preventDefault();
    return false;
  }
});

// 禁用右键菜单
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  return false;
});
</script>
</body>
